<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الاختبارات - Therapeutics</title>
    <style>
        :root {
            --olive-green: #556B2F;
            --light-beige: #F5F5DC;
            --dark-text: #2c2c2c;
            --white: #ffffff;
            --accent-green: #6B8E23;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-beige);
            color: var(--dark-text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--olive-green);
            color: var(--white);
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        h1 { margin: 0; font-size: 1.8rem; }
        p.subtitle { margin-top: 10px; opacity: 0.9; }

        .file-list {
            display: grid;
            gap: 20px;
            margin-top: 20px;
        }

        .file-card {
            background-color: var(--white);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: var(--dark-text);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .file-card:hover {
            border-color: var(--olive-green);
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .file-icon {
            background-color: var(--light-beige);
            color: var(--olive-green);
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
        }

        .file-details { text-align: right; }
        .file-name { font-weight: bold; font-size: 1.2rem; display: block; }
        .file-meta { font-size: 0.9rem; color: #666; margin-top: 4px; }

        .btn-open {
            background-color: var(--olive-green);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .file-card:hover .btn-open {
            background-color: var(--accent-green);
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            color: var(--olive-green);
        }
    </style>
</head>
<body>

    <header>
        <h1>بوابة المختبرات الإلكترونية</h1>
        <p class="subtitle">كلية الصيدلة - جامعة الكوفة</p>
    </header>

    <div class="container">
        <h2>اختر الاختبار للمراجعة</h2>
        
        <div class="file-list">
            <a href="therapeutic1.html" class="file-card">
                <div class="file-info">
                    <div class="file-icon">📄</div>
                    <div class="file-details">
                        <span class="file-name">therapeutic1.html</span>
                        <span class="file-meta">اختبار مانعات الحمل - الجزء الأول</span>
                    </div>
                </div>
                <div class="btn-open">فتح الاختبار</div>
            </a>

            <a href="therapeutic2.html" class="file-card">
                <div class="file-info">
                    <div class="file-icon">📄</div>
                    <div class="file-details">
                        <span class="file-name">therapeutic2.html</span>
                        <span class="file-meta">اختبار مانعات الحمل - الجزء الثاني</span>
                    </div>
                </div>
                <div class="btn-open">فتح الاختبار</div>
            </a>
        </div>
    </div>

    <footer>
        تم التصميم لدعم دراسة الصيدلة السريرية - المرحلة الخامسة
    </footer>

</body>
</html>
